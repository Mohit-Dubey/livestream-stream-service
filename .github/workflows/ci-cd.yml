name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test-user-service:
    name: Test User Service
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: userdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: user-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: user-service
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/userdb
          SECRET_KEY: test-secret-key-for-ci-only-32chars!!
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
        run: pytest tests/ -v

  test-stream-service:
    name: Test Stream Service
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: stream-service
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: stream-service
        env:
          MONGO_URL: mongodb://localhost:27017
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          USER_SERVICE_URL: http://localhost:8000
          ANT_MEDIA_URL: http://localhost:5080
          ANT_MEDIA_USER: admin
          ANT_MEDIA_PASSWORD: test
          ANT_MEDIA_APP: live
        run: pytest tests/ -v

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-user-service, test-stream-service]
    steps:
      - uses: actions/checkout@v4

      - name: Build user-service image
        run: docker build -t user-service:latest ./user-service

      - name: Build stream-service image
        run: docker build -t stream-service:latest ./stream-service

      - name: Verify images exist
        run: docker images | grep -E "user-service|stream-service"
