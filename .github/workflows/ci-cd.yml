name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Test Stream Service
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
          RABBITMQ_URL: amqp://guest:guest@localhost:5672/
          USER_SERVICE_URL: http://localhost:8000
          ANT_MEDIA_URL: http://localhost:5080
          ANT_MEDIA_USER: admin
          ANT_MEDIA_PASSWORD: test
          ANT_MEDIA_APP: live
        run: pytest tests/ -v

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build stream-service image
        run: docker build -t stream-service:latest .

      - name: Verify image exists
        run: docker images | grep stream-service
